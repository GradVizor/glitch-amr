ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. Wheel Odometry from ESP32
    odom0: /wheel/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false, # Trust vx (forward velocity)
                   false, false, true,  # Trust vyaw (rotational velocity)
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # 2. Raw IMU from ESP32
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,   # Trust vyaw (angular velocity around Z)
                  false, false, false]
    imu0_differential: false
    imu0_relative: true